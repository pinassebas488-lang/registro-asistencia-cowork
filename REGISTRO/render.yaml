services:
  # Servicio Web Principal
  - type: web
    name: registro-asistencia
    env: docker
    dockerfilePath: ./Dockerfile.render
    dockerContext: .
    plan: free
    region: oregon
    
    # Variables de entorno
    envVars:
      - key: DB_HOST
        sync: false
        value: ${DB_HOST}
      - key: DB_NAME
        sync: false
        value: ${DB_NAME}
      - key: DB_USER
        sync: false
        value: ${DB_USER}
      - key: DB_PASSWORD
        sync: false
        value: ${DB_PASSWORD}
    
    # Health check
    healthCheckPath: /
    
    # Auto-deploy desde GitHub
    autoDeploy: true
    
    # Región y configuración
    region: oregon
    
  # Base de Datos PostgreSQL (Gratis en Render)
  - type: postgres
    name: registro-asistencia-db
    plan: free
    region: oregon
    
    # Base de datos inicial
    databaseName: registro_asistencia
    
    # IP permitidas (Render + tu IP local)
    ipAllowList: []
    
    # Auto-deploy
    autoDeploy: true
