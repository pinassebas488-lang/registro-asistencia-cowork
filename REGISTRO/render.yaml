services:
  # Servicio Web Principal
  - type: web
    name: asistencia-qr
    env: docker
    dockerfilePath: ./Dockerfile
    dockerContext: .
    plan: free
    region: oregon
    
    # Variables de entorno
    envVars:
      - key: DB_TYPE
        value: postgresql
    
    # Health check
    healthCheckPath: /
    
    # Auto-deploy desde GitHub
    autoDeploy: true
    
  # Base de Datos PostgreSQL (Gratis en Render)
  - type: postgres
    name: asistencia-qr-db
    plan: free
    region: oregon
    
    # Base de datos inicial
    databaseName: asistencia_qr
    
    # Auto-deploy
    autoDeploy: true
